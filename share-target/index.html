<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SendSteps — Shared content</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#10b981">
  <link rel="manifest" href="/favicon/site.webmanifest">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0f1a2e; --ink2: #4a5568; --ink3: #7a8fa6;
      --bg: #f0f4f8; --surface: #ffffff; --border: #e2e8f0;
      --green: #10b981; --green-d: #059669; --green-l: #d1fae5;
      --font-display: 'Baloo 2', cursive;
      --font-body: 'Nunito', system-ui, sans-serif;
    }
    body { font-family: var(--font-body); background: var(--bg); color: var(--ink);
      min-height: 100vh; display: flex; flex-direction: column; }

    .header { background: var(--ink); padding: 14px 22px; display: flex;
      align-items: center; gap: 14px; }
    .header-back { font-size: .75rem; font-weight: 700; color: rgba(255,255,255,.6);
      text-decoration: none; border: 1.5px solid rgba(255,255,255,.2);
      border-radius: 20px; padding: 4px 12px; transition: all .15s; }
    .header-back:hover { color: white; border-color: rgba(255,255,255,.5); }
    .header-title { font-family: var(--font-display); font-size: 1.1rem;
      font-weight: 800; color: white; }

    .main { max-width: 560px; margin: 0 auto; padding: 40px 20px; flex: 1; }

    .card { background: var(--surface); border: 2px solid var(--border);
      border-radius: 16px; padding: 28px; margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(15,26,46,.08); }

    h1 { font-family: var(--font-display); font-size: 1.4rem; font-weight: 800;
      color: var(--ink); margin-bottom: 6px; }
    .sub { font-size: .88rem; color: var(--ink3); margin-bottom: 24px; }

    .shared-content { background: var(--bg); border-radius: 10px;
      padding: 14px 16px; margin-bottom: 20px; font-size: .9rem;
      color: var(--ink2); line-height: 1.6; border: 1.5px solid var(--border); }
    .shared-label { font-size: .7rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .8px; color: var(--ink3); margin-bottom: 6px; }

    .tools-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .tool-link { display: flex; align-items: center; gap: 10px;
      background: var(--bg); border: 2px solid var(--border); border-radius: 12px;
      padding: 12px 14px; text-decoration: none; transition: all .15s; }
    .tool-link:hover { border-color: var(--green); background: var(--green-l); }
    .tool-icon { font-size: 1.3rem; flex-shrink: 0; }
    .tool-name { font-size: .82rem; font-weight: 700; color: var(--ink); }
    .tool-desc { font-size: .72rem; color: var(--ink3); margin-top: 1px; }

    .home-btn { display: block; width: 100%; text-align: center;
      font-family: var(--font-body); font-size: .9rem; font-weight: 800;
      background: var(--green); color: white; border: none; border-radius: 12px;
      padding: 13px; text-decoration: none; transition: all .15s; margin-top: 8px; }
    .home-btn:hover { background: var(--green-d); transform: translateY(-1px); }
  </style>
</head>
<body>

<header class="header">
  <a href="/" class="header-back">← SendSteps</a>
  <div class="header-title">SendSteps</div>
</header>

<main class="main">
  <div class="card">
    <h1>Content shared with SendSteps</h1>
    <p class="sub">Here's what was shared — open a tool below to use it.</p>

    <div id="sharedContent"></div>

    <p style="font-size:.8rem;font-weight:700;color:var(--ink3);margin-bottom:12px">
      Open it in a tool:
    </p>
    <div class="tools-grid">
      <a href="/task-helper-netlify/" class="tool-link" id="taskLink">
        <span class="tool-icon">✨</span>
        <div>
          <div class="tool-name">AI Task Helper</div>
          <div class="tool-desc">Break it into steps</div>
        </div>
      </a>
      <a href="/brain-dump/" class="tool-link">
        <span class="tool-icon">🧠</span>
        <div>
          <div class="tool-name">Brain Dump Pad</div>
          <div class="tool-desc">Add to your dump</div>
        </div>
      </a>
      <a href="/worry-box/" class="tool-link">
        <span class="tool-icon">📦</span>
        <div>
          <div class="tool-name">Worry Box</div>
          <div class="tool-desc">Write it and lock it away</div>
        </div>
      </a>
      <a href="/socialstory/" class="tool-link">
        <span class="tool-icon">📖</span>
        <div>
          <div class="tool-name">Social Story</div>
          <div class="tool-desc">Build a story around it</div>
        </div>
      </a>
    </div>
  </div>

  <a href="/" class="home-btn">← Back to all tools</a>
</main>

<script>
  const params = new URLSearchParams(window.location.search);
  const title = params.get('title') || '';
  const text  = params.get('text')  || '';
  const url   = params.get('url')   || '';

  const content = document.getElementById('sharedContent');

  if (!title && !text && !url) {
    content.innerHTML = '<p style="color:var(--ink3);font-size:.88rem">Nothing was shared — go back to a tool.</p>';
  } else {
    let html = '';
    if (title) html += `<div class="shared-label">Title</div>
      <div class="shared-content">${esc(title)}</div>`;
    if (text)  html += `<div class="shared-label">Text</div>
      <div class="shared-content">${esc(text)}</div>`;
    if (url)   html += `<div class="shared-label">URL</div>
      <div class="shared-content"><a href="${esc(url)}" target="_blank"
        style="color:var(--green)">${esc(url)}</a></div>`;
    content.innerHTML = html;

    // Pre-fill task helper link with shared text
    const taskText = encodeURIComponent(title || text || url);
    document.getElementById('taskLink').href =
      `/task-helper-netlify/?task=${taskText}`;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

</body>
</html>
