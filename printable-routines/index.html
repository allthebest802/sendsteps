<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Printable Routine Sheets — SendSteps</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F7F4;--surface:#fff;--surface2:#EAF4F0;
  --ink:#1C3A2F;--ink2:#4A6B5E;--muted:#8AA89F;
  --accent:#2ECC87;--accent-d:#1FA869;
  --purple:#7C3AED;--purple-l:#EDE9FE;
  --amber:#F59E0B;--amber-l:#FEF3C7;
  --rose:#F43F5E;--rose-l:#FFE4E6;
  --sky:#0EA5E9;--sky-l:#E0F2FE;
  --border:#D0E8DF;--border2:#B0D4C8;
  --radius:16px;--radius-sm:10px;
  --shadow:0 2px 12px rgba(30,80,60,0.10);
  --shadow-lg:0 8px 32px rgba(30,80,60,0.15);
  --font-display:'Baloo 2',cursive;
  --font-body:'Nunito',sans-serif;
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);min-height:100vh;
  background-image:radial-gradient(ellipse at 0% 0%,rgba(46,204,135,0.12),transparent 55%),
  radial-gradient(ellipse at 100% 100%,rgba(124,58,237,0.08),transparent 50%);
}
button{cursor:pointer;font-family:var(--font-body);border:none;background:none}

/* HEADER */
.header{background:linear-gradient(135deg,#1FA869,#2ECC87);padding:20px 24px 16px;box-shadow:var(--shadow)}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:1.8rem}
.logo h1{font-family:var(--font-display);font-size:1.4rem;font-weight:800;color:white;line-height:1}
.logo h1 span{opacity:0.85;font-weight:600}
.header-sub{font-size:0.8rem;color:rgba(255,255,255,0.8);font-weight:600}

/* LAYOUT */
.app{max-width:1100px;margin:0 auto;padding:24px 20px 60px;display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start}
@media(max-width:780px){.app{grid-template-columns:1fr}}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:14px;position:sticky;top:16px}
.panel{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.panel-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.panel-head h3{font-family:var(--font-display);font-size:0.95rem;font-weight:800;color:var(--ink)}
.panel-body{padding:12px}

/* CATEGORY TABS */
.cat-tabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.cat-tab{padding:5px 10px;border-radius:100px;font-size:0.72rem;font-weight:700;border:1.5px solid var(--border2);color:var(--ink2);transition:all 0.15s;cursor:pointer}
.cat-tab:hover{border-color:var(--accent);color:var(--accent-d)}
.cat-tab.active{background:var(--accent);border-color:var(--accent);color:white}

/* ROUTINE LIST */
.routine-list{display:flex;flex-direction:column;gap:5px;max-height:380px;overflow-y:auto}
.routine-item{padding:10px 12px;border-radius:10px;border:1.5px solid var(--border);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:8px}
.routine-item:hover{border-color:var(--accent);background:var(--surface2)}
.routine-item.active{border-color:var(--accent);background:#E8FBF2;box-shadow:0 0 0 2px rgba(46,204,135,0.2)}
.ri-emoji{font-size:1.2rem;flex-shrink:0}
.ri-info{overflow:hidden}
.ri-name{font-size:0.82rem;font-weight:700;color:var(--ink);line-height:1.2}
.ri-cat{font-size:0.68rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.4px}

/* FORMAT PICKER */
.format-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.fmt-btn{padding:10px 8px;border-radius:10px;border:2px solid var(--border);font-size:0.78rem;font-weight:700;color:var(--ink2);transition:all 0.15s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px}
.fmt-btn:hover{border-color:var(--accent);color:var(--accent-d);background:var(--surface2)}
.fmt-btn.active{border-color:var(--accent);background:#E8FBF2;color:var(--accent-d)}
.fmt-icon{font-size:1.4rem}

/* COLOUR PICKER */
.colour-swatches{display:flex;flex-wrap:wrap;gap:6px}
.colour-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.15s}
.colour-swatch:hover{transform:scale(1.1)}
.colour-swatch.active{border-color:var(--ink);transform:scale(1.1)}

/* MAIN AREA */
.main-area{display:flex;flex-direction:column;gap:16px}

/* EDITOR */
.editor-panel{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.editor-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.editor-head h2{font-family:var(--font-display);font-size:1.1rem;font-weight:800;color:var(--ink);flex:1}
.editor-body{padding:18px}

/* EDITABLE TITLE */
.edit-title{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--ink);background:var(--surface2);margin-bottom:14px;outline:none;transition:border-color 0.15s}
.edit-title:focus{border-color:var(--accent)}

/* STEPS EDITOR */
.steps-editor{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.step-row{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:8px 10px;transition:border-color 0.15s}
.step-row:focus-within{border-color:var(--accent)}
.step-drag{color:var(--muted);cursor:grab;font-size:1rem;padding:0 2px;flex-shrink:0}
.step-emoji-btn{font-size:1.3rem;flex-shrink:0;padding:2px 4px;border-radius:6px;transition:background 0.1s;background:none;border:none;cursor:pointer}
.step-emoji-btn:hover{background:var(--border)}
.step-input{flex:1;border:none;background:none;font-family:var(--font-body);font-size:0.88rem;font-weight:700;color:var(--ink);outline:none}
.step-input::placeholder{color:var(--muted);font-weight:600}
.step-del{color:var(--muted);font-size:1rem;padding:2px 6px;border-radius:6px;transition:all 0.1s;flex-shrink:0}
.step-del:hover{background:#FFE4E6;color:var(--rose)}
.add-step-btn{padding:9px;border-radius:10px;border:2px dashed var(--border2);color:var(--muted);font-size:0.82rem;font-weight:700;width:100%;transition:all 0.15s}
.add-step-btn:hover{border-color:var(--accent);color:var(--accent-d);background:var(--surface2)}

/* ADD STEP ROW */
.add-step-row{display:flex;gap:6px;align-items:stretch}
.add-step-row .add-step-btn{flex:1;width:auto}
.preset-dropdown-wrap{position:relative}
.preset-dropdown-btn{padding:9px 12px;border-radius:10px;border:2px dashed var(--border2);color:var(--muted);font-size:0.82rem;font-weight:700;background:none;transition:all 0.15s;white-space:nowrap;display:flex;align-items:center;gap:5px;cursor:pointer}
.preset-dropdown-btn:hover{border-color:var(--accent);color:var(--accent-d);background:var(--surface2)}
.preset-menu{position:absolute;bottom:calc(100% + 6px);right:0;background:white;border:1.5px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);min-width:220px;max-height:320px;overflow-y:auto;z-index:300;display:none}
.preset-menu.open{display:block}
.preset-group-label{font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);padding:8px 12px 4px;border-top:1px solid var(--border)}
.preset-group-label:first-child{border-top:none}
.preset-option{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;transition:background 0.1s;font-size:0.82rem;font-weight:700;color:var(--ink)}
.preset-option:hover{background:var(--surface2)}
.preset-option .po-emoji{font-size:1rem;flex-shrink:0}
.preset-option .po-label{flex:1}

/* PRINT BUTTONS */
.print-actions{display:flex;gap:8px;flex-wrap:wrap}
.print-btn{display:inline-flex;align-items:center;gap:7px;padding:11px 20px;border-radius:100px;font-size:0.88rem;font-weight:700;transition:all 0.15s}
.print-btn.primary{background:var(--accent);color:white;box-shadow:0 4px 14px rgba(46,204,135,0.35)}
.print-btn.primary:hover{background:var(--accent-d);transform:translateY(-1px);box-shadow:0 6px 18px rgba(46,204,135,0.4)}
.print-btn.secondary{background:var(--purple);color:white;box-shadow:0 4px 14px rgba(124,58,237,0.25)}
.print-btn.secondary:hover{background:#6D28D9;transform:translateY(-1px)}
.print-btn.ghost{background:var(--surface2);color:var(--ink2);border:1.5px solid var(--border2)}
.print-btn.ghost:hover{background:var(--border);color:var(--ink)}

/* PREVIEW */
.preview-wrap{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.preview-head{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.preview-head h3{font-family:var(--font-display);font-size:0.95rem;font-weight:800;color:var(--ink);flex:1}
.preview-badge{font-size:0.68rem;font-weight:700;padding:3px 10px;border-radius:100px;background:var(--purple-l);color:var(--purple);text-transform:uppercase;letter-spacing:0.4px}
.preview-body{padding:18px;min-height:200px}

/* VISUAL SCHEDULE PREVIEW */
.vs-preview{display:flex;flex-direction:column;gap:0}
.vs-title{font-family:var(--font-display);font-size:1.1rem;font-weight:800;text-align:center;margin-bottom:14px;padding-bottom:10px;border-bottom:3px solid currentColor}
.vs-steps{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.vs-step{border-radius:12px;padding:10px 8px;text-align:center;border:2px solid rgba(0,0,0,0.08)}
.vs-step-emoji{font-size:1.8rem;display:block;margin-bottom:5px}
.vs-step-label{font-size:0.72rem;font-weight:700;line-height:1.3}
.vs-step-num{font-size:0.6rem;font-weight:800;opacity:0.5;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.5px}

/* CHECKLIST PREVIEW */
.cl-preview{font-family:'Nunito',sans-serif}
.cl-title{font-size:1.1rem;font-weight:800;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #eee;display:flex;align-items:center;gap:8px}
.cl-step{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0}
.cl-box{width:22px;height:22px;border-radius:5px;border:2px solid;flex-shrink:0}
.cl-emoji{font-size:1.1rem;flex-shrink:0}
.cl-label{font-size:0.88rem;font-weight:700}

/* CHART PREVIEW */
.chart-preview{}
.chart-title{font-size:1rem;font-weight:800;margin-bottom:10px;text-align:center}
.chart-table{width:100%;border-collapse:collapse;font-size:0.72rem}
.chart-table th{padding:5px 3px;text-align:center;font-weight:800;border:1.5px solid #ddd}
.chart-table td{padding:6px 3px;text-align:center;border:1.5px solid #ddd;font-size:0.9rem}
.chart-table .step-col{text-align:left;padding-left:6px;font-weight:700}

/* EMPTY STATE */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:3rem;display:block;margin-bottom:10px;opacity:0.5}

/* EMOJI PICKER POPUP */
.emoji-popup{position:absolute;background:white;border:1.5px solid var(--border);border-radius:12px;padding:10px;box-shadow:var(--shadow-lg);display:grid;grid-template-columns:repeat(6,1fr);gap:4px;z-index:200;width:200px}
.emoji-popup button{font-size:1.2rem;padding:4px;border-radius:6px;transition:background 0.1s}
.emoji-popup button:hover{background:var(--surface2)}

@media print{
  body,html{background:white !important}
  body *{visibility:hidden}
  #printTarget,#printTarget *{visibility:visible}
  #printTarget{position:fixed;left:0;top:0;width:100%;height:100%}
  .no-print{display:none !important}
}
</style>
</head>
<body>

<header class="header no-print">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">🌿</span>
      <h1>SendSteps <span>Printable Routines</span></h1>
    </div>
    <div class="header-sub">Ready-made visual routines for SEND, SEN & all learners</div>
  </div>
</header>

<div class="app no-print">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- ROUTINE PICKER -->
    <div class="panel">
      <div class="panel-head"><h3>📋 Choose a routine</h3></div>
      <div class="panel-body">
        <div class="cat-tabs" id="catTabs"></div>
        <div class="routine-list" id="routineList"></div>
      </div>
    </div>

    <!-- FORMAT -->
    <div class="panel">
      <div class="panel-head"><h3>🖨️ Print format</h3></div>
      <div class="panel-body">
        <div class="format-btns" id="formatBtns">
          <button class="fmt-btn active" data-fmt="visual" onclick="setFormat('visual',this)">
            <span class="fmt-icon">🎨</span>Visual Schedule
          </button>
          <button class="fmt-btn" data-fmt="checklist" onclick="setFormat('checklist',this)">
            <span class="fmt-icon">✅</span>Checklist
          </button>
          <button class="fmt-btn" data-fmt="chart" onclick="setFormat('chart',this)">
            <span class="fmt-icon">📅</span>Weekly Chart
          </button>
        </div>
      </div>
    </div>

    <!-- COLOUR -->
    <div class="panel" id="colourPanel">
      <div class="panel-head"><h3>🎨 Colour theme</h3></div>
      <div class="panel-body">
        <div class="colour-swatches" id="colourSwatches"></div>
      </div>
    </div>

  </aside>

  <!-- MAIN -->
  <div class="main-area">

    <!-- EDITOR -->
    <div class="editor-panel">
      <div class="editor-head">
        <h2 id="editorHeading">👈 Select a routine to get started</h2>
        <div class="print-actions" id="printActions" style="display:none">
          <button class="print-btn primary" onclick="doPrint()">🖨️ Print</button>
          <button class="print-btn secondary" onclick="doPDF()">📄 Download PDF</button>
        </div>
      </div>
      <div class="editor-body" id="editorBody">
        <div class="empty-state">
          <span class="empty-icon">📄</span>
          <p style="font-weight:700;font-size:0.95rem;margin-bottom:6px">No routine selected</p>
          <p style="font-size:0.82rem">Pick a routine from the left to preview and customise it</p>
        </div>
      </div>
    </div>

    <!-- PREVIEW -->
    <div class="preview-wrap" id="previewWrap" style="display:none">
      <div class="preview-head">
        <h3>👁️ Print preview</h3>
        <span class="preview-badge" id="previewBadge">Visual Schedule</span>
      </div>
      <div class="preview-body" id="previewBody"></div>
    </div>

  </div>
</div>

<!-- PRINT TARGET (hidden, rendered to DOM for printing) -->
<div id="printTarget" style="display:none"></div>

// ══════════════════════════════════════════
// INIT UI
// ══════════════════════════════════════════
function init() {
  renderCatTabs();
  renderRoutineList();
  renderColourSwatches();
}

function renderCatTabs() {
  const el = document.getElementById('catTabs');
  el.innerHTML = CATEGORIES.map(c => `
    <button class="cat-tab${c.id === state.activeCategory ? ' active' : ''}"
      onclick="setCategory('${c.id}')">${c.label}</button>
  `).join('');
}

function setCategory(id) {
  state.activeCategory = id;
  renderCatTabs();
  renderRoutineList();
}

function renderRoutineList() {
  const el = document.getElementById('routineList');
  const filtered = state.activeCategory === 'all'
    ? ROUTINES
    : ROUTINES.filter(r => r.cat === state.activeCategory);

  el.innerHTML = filtered.map(r => `
    <div class="routine-item${state.routineId === r.id ? ' active' : ''}" onclick="selectRoutine('${r.id}')">
      <span class="ri-emoji">${r.emoji}</span>
      <div class="ri-info">
        <div class="ri-name">${r.name}</div>
        <div class="ri-cat">${CATEGORIES.find(c=>c.id===r.cat)?.label || ''}</div>
      </div>
    </div>
  `).join('');
}

function renderColourSwatches() {
  const el = document.getElementById('colourSwatches');
  el.innerHTML = COLOUR_THEMES.map(t => `
    <div class="colour-swatch${t.id === state.theme.id ? ' active' : ''}"
      style="background:${t.step}"
      title="${t.name}"
      onclick="setTheme('${t.id}')"></div>
  `).join('');
}

// ══════════════════════════════════════════
// SELECT ROUTINE
// ══════════════════════════════════════════
function selectRoutine(id) {
  const r = ROUTINES.find(x => x.id === id);
  if (!r) return;
  state.routineId = id;
  state.title = r.name;
  state.steps = r.steps.map(s => ({...s}));
  renderRoutineList();
  renderEditor();
  renderPreview();
}

// ══════════════════════════════════════════
// EDITOR
// ══════════════════════════════════════════
function renderEditor() {
  if (!state.routineId) return;
  document.getElementById('editorHeading').textContent = '✏️ Customise your routine';
  document.getElementById('printActions').style.display = 'flex';
  document.getElementById('previewWrap').style.display = 'block';

  const body = document.getElementById('editorBody');
  body.innerHTML = `
    <input type="text" class="edit-title" id="editTitle" value="${escHtml(state.title)}"
      placeholder="Routine title..." oninput="onTitleChange(this.value)">
    <div class="steps-editor" id="stepsEditor"></div>
    <div class="add-step-row">
      <button class="add-step-btn" onclick="addStep()">＋ Add your own step</button>
      <div class="preset-dropdown-wrap">
        <button class="preset-dropdown-btn" onclick="togglePresetMenu(event)" title="Add from presets">
          📋 Quick add ▾
        </button>
        <div class="preset-menu" id="presetMenu"></div>
      </div>
    </div>
  `;
  renderSteps();
  buildPresetMenu();
}

function renderSteps() {
  const el = document.getElementById('stepsEditor');
  if (!el) return;
  el.innerHTML = state.steps.map((s, i) => `
    <div class="step-row" data-idx="${i}">
      <span class="step-drag" title="Drag to reorder">⠿</span>
      <button class="step-emoji-btn" onclick="openEmojiPicker(${i}, this)" title="Change emoji">${s.e}</button>
      <input class="step-input" value="${escHtml(s.t)}" placeholder="Step description..."
        oninput="onStepChange(${i}, this.value)">
      <button class="step-del" onclick="deleteStep(${i})" title="Remove step">✕</button>
    </div>
  `).join('');
  initDrag();
}

function onTitleChange(v) {
  state.title = v;
  renderPreview();
}

function onStepChange(i, v) {
  state.steps[i].t = v;
  renderPreview();
}

function buildPresetMenu() {
  const menu = document.getElementById('presetMenu');
  if (!menu) return;
  menu.innerHTML = PRESET_STEPS.map(group => `
    <div class="preset-group-label">${group.group}</div>
    ${group.steps.map((s, si) => {
      const gIdx = PRESET_STEPS.findIndex(g => g === group);
      return `<div class="preset-option" data-emoji="${s.e}" data-title="${s.t.replace(/"/g,'&quot;')}" onclick="addPresetStep(this)">
        <span class="po-emoji">${s.e}</span>
        <span class="po-label">${s.t}</span>
      </div>`;
    }).join('')}
  `).join('');
}

function togglePresetMenu(e) {
  e.stopPropagation();
  const menu = document.getElementById('presetMenu');
  menu.classList.toggle('open');
  if (menu.classList.contains('open')) {
    setTimeout(() => document.addEventListener('click', closePresetMenu), 10);
  }
}

function closePresetMenu() {
  const menu = document.getElementById('presetMenu');
  if (menu) menu.classList.remove('open');
  document.removeEventListener('click', closePresetMenu);
}

function addPresetStep(el) {
  const emoji = el.dataset.emoji;
  const title = el.dataset.title;
  state.steps.push({e: emoji, t: title});
  renderSteps();
  renderPreview();
  buildPresetMenu();
  closePresetMenu();
}

function addStep() {
  state.steps.push({e:'⭐', t:''});
  renderSteps();
  renderPreview();
  setTimeout(() => {
    const inputs = document.querySelectorAll('.step-input');
    if (inputs.length) inputs[inputs.length-1].focus();
  }, 50);
}

function deleteStep(i) {
  state.steps.splice(i, 1);
  renderSteps();
  renderPreview();
}

// ══════════════════════════════════════════
// EMOJI PICKER
// ══════════════════════════════════════════
let activeEmojiIdx = null;
let activeEmojiPopup = null;

function openEmojiPicker(idx, btn) {
  closeEmojiPicker();
  activeEmojiIdx = idx;
  const popup = document.createElement('div');
  popup.className = 'emoji-popup';
  popup.style.position = 'absolute';
  STEP_EMOJIS.forEach(e => {
    const b = document.createElement('button');
    b.textContent = e;
    b.onclick = () => { state.steps[activeEmojiIdx].e = e; closeEmojiPicker(); renderSteps(); renderPreview(); };
    popup.appendChild(b);
  });
  btn.style.position = 'relative';
  btn.appendChild(popup);
  activeEmojiPopup = popup;
  setTimeout(() => document.addEventListener('click', outsideClickClose), 10);
}

function closeEmojiPicker() {
  if (activeEmojiPopup) { activeEmojiPopup.remove(); activeEmojiPopup = null; }
  document.removeEventListener('click', outsideClickClose);
}

function outsideClickClose(e) {
  if (activeEmojiPopup && !activeEmojiPopup.contains(e.target)) closeEmojiPicker();
}

// ══════════════════════════════════════════
// FORMAT & THEME
// ══════════════════════════════════════════
function setFormat(fmt, btn) {
  state.format = fmt;
  document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const labels = {visual:'Visual Schedule', checklist:'Checklist', chart:'Weekly Chart'};
  document.getElementById('previewBadge').textContent = labels[fmt] || fmt;
  renderPreview();
}

function setTheme(id) {
  state.theme = COLOUR_THEMES.find(t => t.id === id) || COLOUR_THEMES[0];
  renderColourSwatches();
  renderPreview();
}

// ══════════════════════════════════════════
// DRAG TO REORDER
// ══════════════════════════════════════════
function initDrag() {
  const rows = document.querySelectorAll('.step-row');
  let dragIdx = null;
  rows.forEach((row, i) => {
    row.draggable = true;
    row.addEventListener('dragstart', () => { dragIdx = i; row.style.opacity = '0.5'; });
    row.addEventListener('dragend', () => { row.style.opacity = '1'; });
    row.addEventListener('dragover', e => { e.preventDefault(); });
    row.addEventListener('drop', () => {
      if (dragIdx === null || dragIdx === i) return;
      const [item] = state.steps.splice(dragIdx, 1);
      state.steps.splice(i, 0, item);
      dragIdx = null;
      renderSteps();
      renderPreview();
    });
  });
}

// ══════════════════════════════════════════
// PREVIEW RENDER
// ══════════════════════════════════════════
function renderPreview() {
  if (!state.routineId) return;
  const el = document.getElementById('previewBody');
  const t = state.theme;

  if (state.format === 'visual') {
    el.innerHTML = buildVisualHTML(t, true);
  } else if (state.format === 'checklist') {
    el.innerHTML = buildChecklistHTML(t, true);
  } else if (state.format === 'chart') {
    el.innerHTML = buildChartHTML(t, true);
  }
}

function buildVisualHTML(t, preview) {
  const steps = state.steps.filter(s => s.t.trim());
  const stepCards = steps.map((s, i) => `
    <div class="vs-step" style="background:${lighten(t.step, i)};border-color:${t.step}20">
      <div class="vs-step-num">${i+1}</div>
      <span class="vs-step-emoji">${s.e}</span>
      <div class="vs-step-label" style="color:${t.text}">${escHtml(s.t)}</div>
    </div>`).join('');

  return `<div class="vs-preview" style="background:${t.bg};padding:${preview?'12px':'28px'};border-radius:${preview?'8px':'0'}">
    <div class="vs-title" style="color:${t.step};border-color:${t.step}">${escHtml(state.title)}</div>
    <div class="vs-steps">${stepCards}</div>
  </div>`;
}

function buildChecklistHTML(t, preview) {
  const steps = state.steps.filter(s => s.t.trim());
  const rows = steps.map((s, i) => `
    <div class="cl-step">
      <div class="cl-box" style="border-color:${t.step}"></div>
      <span class="cl-emoji">${s.e}</span>
      <span class="cl-label" style="color:${t.text}">${escHtml(s.t)}</span>
    </div>`).join('');

  return `<div class="cl-preview" style="background:${t.bg};padding:${preview?'12px':'28px'};border-radius:${preview?'8px':'0'}">
    <div class="cl-title" style="color:${t.step}">✅ ${escHtml(state.title)}</div>
    ${rows}
    <div style="margin-top:14px;font-size:0.72rem;color:#aaa;text-align:right">sendsteps.uk</div>
  </div>`;
}

const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function buildChartHTML(t, preview) {
  const steps = state.steps.filter(s => s.t.trim());
  const rows = steps.map(s => `
    <tr>
      <td class="step-col" style="background:${t.step}18">${s.e} ${escHtml(s.t)}</td>
      ${DAYS.map(() => `<td style="font-size:1rem">☐</td>`).join('')}
    </tr>`).join('');

  return `<div style="background:${t.bg};padding:${preview?'12px':'28px'};border-radius:${preview?'8px':'0'}">
    <div class="chart-title" style="color:${t.step};font-family:'Baloo 2',cursive;font-size:1rem;font-weight:800;margin-bottom:10px">${escHtml(state.title)}</div>
    <table class="chart-table">
      <thead>
        <tr>
          <th style="background:${t.step};color:white;min-width:120px">Step</th>
          ${DAYS.map(d=>`<th style="background:${t.step};color:white">${d}</th>`).join('')}
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:10px;font-size:0.68rem;color:#aaa;text-align:right">sendsteps.uk</div>
  </div>`;
}

// Lighten steps for visual schedule alternating colours
function lighten(hex, i) {
  const alphas = ['33','22','44','11','33','22'];
  return hex + (alphas[i % alphas.length]);
}

  .cl-emoji{font-size:14pt;flex-shrink:0}
  .cl-label{font-size:12pt;font-weight:700}
  .chart-title{font-family:'Baloo 2',cursive;font-size:16pt;font-weight:800;margin-bottom:10pt;text-align:center}
  .chart-table{width:100%;border-collapse:collapse;font-size:10pt}
  .chart-table th{padding:6pt 4pt;text-align:center;font-weight:800;border:1.5pt solid #ddd}
  .chart-table td{padding:8pt 4pt;text-align:center;border:1.5pt solid #ddd;font-size:14pt}
  .chart-table .step-col{text-align:left;padding-left:6pt;font-weight:700;font-size:10pt}
  @media print{body{padding:15mm 12mm}}
</style></head><body>${content}</body></html>`;
}

function doPrint() {
  const html = getPrintHTML();
  const w = window.open('', '_blank', 'width=800,height:900');
  w.document.write(html);
  w.document.close();
  w.onload = () => { w.focus(); w.print(); };
}

function doPDF() {
  const html = getPrintHTML();
  const w = window.open('', '_blank', 'width=820,height=1000');
  w.document.write(html);
  w.document.close();
  w.onload = () => {
    w.focus();
    setTimeout(() => { w.print(); }, 800);
  };
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
