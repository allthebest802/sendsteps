<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<title>Message sent — Helpset</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,800;0,900;1,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,800;0,900;1,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"></noscript>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#FAF8F4;--ink:#181825;--ink2:#3A3A52;--green:#2ECC87;--green-d:#157A4C;
  --font-head:'Fraunces',Georgia,serif;--font-body:'Plus Jakarta Sans',system-ui,sans-serif}
body{font-family:var(--font-body);background:var(--cream);color:var(--ink);line-height:1.7;
  min-height:100vh;display:grid;place-items:center;padding:24px}
.box{text-align:center;max-width:460px}
.mark{font-size:3rem;margin-bottom:12px}
h1{font-family:var(--font-head);font-weight:900;font-size:2rem;margin-bottom:10px}
p{color:var(--ink2);margin-bottom:24px}
a.btn{display:inline-block;background:var(--green);color:#fff;padding:12px 26px;
  border-radius:100px;font-weight:800;font-size:.95rem;text-decoration:none}
a.btn:hover{background:var(--green-d)}
</style>
</head>
<body>
<div class="box">
  <div class="mark">💚</div>
  <h1>Message sent</h1>
  <p>Thanks for getting in touch — it's landed safely. Helpset is run by one parent, so a reply might take a day or two, but it will come from a real person.</p>
  <a class="btn" href="/">← Back to Helpset</a>
</div>
</body>
</html>
